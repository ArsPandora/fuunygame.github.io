    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            }
            .text-shadow-lg {
                text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.6);
            }
            .bg-glass {
                background: rgba(29, 53, 87, 0.7);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .transition-all-300 {
                transition: all 0.3s ease;
            }
        }
    </style>
    <style>
        body {
            background-color: #121212;
            color: #f1faee;
            font-family: 'Inter', sans-serif;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1d1d1d;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3d3d3d;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #4d4d4d;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-black">
    <!-- Password Modal -->

        <div class="absolute inset-0 bg-black bg-opacity-80 backdrop-blur-sm"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-darkgray rounded-lg shadow-glow-lg p-8 max-w-md w-full">
                <div class="text-center mb-6">
                    <div class="w-20 h-20 rounded-full overflow-hidden mx-auto mb-4 border-4 border-primary shadow-glow">
                        <img src="https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/d38d84a58649433ab1aebb016249c03d.png~tplv-a9rns2rl98-24:720:720.png?lk3s=8e244e95&rcl=20260430131418BA21D6C35A4E6CEB63B2&rrcfp=8a172a1a&x-expires=1778130858&x-signature=a%2FmrEP4UCoqoKFVKSljk0zw0%2FbQ%3D" alt="Deffrei" class="w-full h-full object-cover">
                    </div>
                    <h2 class="text-2xl font-bold mb-2">Deffrei</h2>
                    <p class="text-gray-400">请输入访问密码</p>
                </div>
                
                <form id="password-form" class="space-y-4">
                    <div>
                        <label for="password-input" class="block text-sm font-medium text-gray-400 mb-1">密码</label>
                        <input type="password" id="password-input" 
                               class="w-full px-4 py-2 bg-darkgray-lighter border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-primary"
                               placeholder="请输入密码..."

                    </div>
                    
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input type="checkbox" id="show-password" class="w-4 h-4 text-primary bg-darkgray-lighter border-gray-600 rounded focus:ring-primary">
                            <label for="show-password" class="ml-2 text-sm text-gray-400">显示密码</label>
                        </div>
                        <a href="index.html" class="text-sm text-gray-400 hover:text-white transition-all-300">
                            返回首页

                    <button type="submit" class="w-full bg-primary hover:bg-opacity-90 text-white font-bold py-2 px-4 rounded-md shadow-glow transition-all-300 hover:-translate-y-1">
                        解锁控制台
                    </button>
                </form>
                
                <div id="password-error" class="mt-4 hidden">
                    <div class="bg-red-900 bg-opacity-30 border border-red-600 text-red-400 px-4 py-2 rounded-md text-sm">
                        <i class="fa fa-exclamation-circle mr-1"></i>
                        <span>密码错误，请重试。</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Console Page (Hidden by default) -->
    <div id="console-page" class="fixed inset-0 z-40 hidden">
        <div class="absolute inset-0 bg-black bg-opacity-95 backdrop-blur-md"></div>
        <div class="absolute inset-0 flex flex-col">
            <!-- Console Header -->
            <div class="bg-darkgray border-b border-darkgray-lighter py-3 px-4 flex justify-between items-center">
                <div class="flex items-center">
                    <img src="https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/d38d84a58649433ab1aebb016249c03d.png~tplv-a9rns2rl98-24:720:720.png?lk3s=8e244e95&rcl=20260430131418BA21D6C35A4E6CEB63B2&rrcfp=8a172a1a&x-expires=1778130858&x-signature=a%2FmrEP4UCoqoKFVKSljk0zw0%2FbQ%3D" alt="Deffrei" class="w-8 h-8 rounded-full mr-2 object-cover border-2 border-primary">
                    <h2 class="text-lg font-bold">Deffrei</h2>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-400">Deffrei Targaryan</span>
                    <a href="index.html" class="text-gray-400 hover:text-white transition-all-300" title="返回首页">
                        <i class="fa fa-home text-xl"></i>
                    </a>
                    <button id="close-console" class="text-gray-400 hover:text-white transition-all-300" title="关闭控制台">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            
            <!-- Console Content -->
            <div class="flex-1 overflow-auto p-6">
                <div class="max-w-4xl mx-auto">
                    <div class="bg-darkgray rounded-lg shadow-lg p-6 mb-6">
                        <h3 class="text-xl font-bold mb-4 flex items-center">
                            <i class="fa fa-gamepad text-primary mr-2"></i>
                            游戏开发进度监控
                        </h3>
                        
                        <div class="space-y-4">
                            <div class="bg-darkgray-lighter rounded-md p-4">
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="font-semibold">《仰望》</h4>
                                    <span class="text-green-500">已完成</span>
                                </div>
                                <div class="w-full bg-darkgray rounded-full h-2 mb-1">
                                    <div class="bg-green-500 h-2 rounded-full" style="width: 100%"></div>
                                </div>
                                <div class="flex items-center justify-between">
                                    <div class="text-xs text-gray-400">100% 完成</div>
                                    <input type="range" min="0" max="100" value="100" class="w-24 h-1 bg-darkgray rounded-lg appearance-none cursor-pointer" data-project-id="1" data-project-name="仰望">
                                </div>
                            </div>
                            
                            <div class="bg-darkgray-lighter rounded-md p-4">
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="font-semibold">《神界余罪》</h4>
                                    <span class="text-yellow-500">开发中</span>
                                </div>
                                <div class="w-full bg-darkgray rounded-full h-2 mb-1">
                                    <div class="bg-yellow-500 h-2 rounded-full" style="width: 45%"></div>
                                </div>
                                <div class="flex items-center justify-between">
                                    <div class="text-xs text-gray-400">45% 完成</div>
                                    <input type="range" min="0" max="100" value="45" class="w-24 h-1 bg-darkgray rounded-lg appearance-none cursor-pointer" data-project-id="2" data-project-name="神界余罪">
                                </div>
                            </div>
                            
                            <div class="bg-darkgray-lighter rounded-md p-4">
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="font-semibold">《寻乡》</h4>
                                    <span class="text-yellow-500">开发中</span>
                                </div>
                                <div class="w-full bg-darkgray rounded-full h-2 mb-1">
                                    <div class="bg-yellow-500 h-2 rounded-full" style="width: 30%"></div>
                                </div>
                                <div class="flex items-center justify-between">
                                    <div class="text-xs text-gray-400">30% 完成</div>
                                    <input type="range" min="0" max="100" value="30" class="w-24 h-1 bg-darkgray rounded-lg appearance-none cursor-pointer" data-project-id="3" data-project-name="寻乡">
                                </div>
                            </div>
                        </div>
                    </div>
                    

                    

                    

                </div>
            </div>
            
            <!-- Console Footer -->
            <div class="bg-darkgray border-t border-darkgray-lighter py-3 px-4 text-center text-sm text-gray-400">
                <p>Deffrei Targaryan | Darkfyre Studio | 开发者控制台 v1.0</p>
            </div>
        </div>
    </div>

    <script>
        // Password protection functionality with two-factor authentication
        document.addEventListener('DOMContentLoaded', function() {
            const passwordModal = document.getElementById('password-modal');
            const consolePage = document.getElementById('console-page');
            const passwordForm = document.getElementById('password-form');
            const passwordInput = document.getElementById('password-input');
            const showPasswordCheckbox = document.getElementById('show-password');
            const closeConsoleButton = document.getElementById('close-console');
            const passwordError = document.getElementById('password-error');
            
            const CORRECT_PASSWORD = 'BF89757';
            

            
            // Initialize progress bars functionality
            function initProgressBars() {
                const progressBars = document.querySelectorAll('input[type="range"]');
                const progressData = JSON.parse(localStorage.getItem('deffrei_progress') || '{}');
                
                // Load saved progress data
                progressBars.forEach(bar => {
                    const projectId = bar.getAttribute('data-project-id');
                    if (progressData[projectId] !== undefined) {
                        bar.value = progressData[projectId];
                        updateProgressBar(bar);
                    }
                });
                
                // Add event listeners
                progressBars.forEach(bar => {
                    bar.addEventListener('input', function() {
                        updateProgressBar(this);
                        saveProgressData();
                    });
                    
                    bar.addEventListener('change', function() {
                        // Sync with projects page when progress changes
                        syncProgressToProjectsPage();
                    });
                });
                
                function updateProgressBar(bar) {
                    const projectId = bar.getAttribute('data-project-id');
                    const progress = parseInt(bar.value);
                    const progressText = bar.previousElementSibling;
                    const progressBar = bar.closest('.bg-darkgray-lighter').querySelector('.bg-green-500, .bg-yellow-500, .bg-gray-500');
                    const statusBadge = bar.closest('.bg-darkgray-lighter').querySelector('span');
                    
                    // Update progress text
                    progressText.textContent = `${progress}% 完成`;
                    
                    // Update progress bar width
                    if (progressBar) {
                        progressBar.style.width = `${progress}%`;
                        
                        // Update color based on progress
                        if (progress === 100) {
                            progressBar.className = 'bg-green-500 h-2 rounded-full';
                            if (statusBadge) {
                                statusBadge.className = 'text-green-500';
                                statusBadge.textContent = '已完成';
                            }
                        } else if (progress > 0) {
                            progressBar.className = 'bg-yellow-500 h-2 rounded-full';
                            if (statusBadge) {
                                statusBadge.className = 'text-yellow-500';
                                statusBadge.textContent = '开发中';
                            }
                        } else {
                            progressBar.className = 'bg-gray-500 h-2 rounded-full';
                            if (statusBadge) {
                                statusBadge.className = 'text-gray-500';
                                statusBadge.textContent = '未开始';
                            }
                        }
                    }
                }
                
                function saveProgressData() {
                    const progressData = {};
                    progressBars.forEach(bar => {
                        const projectId = bar.getAttribute('data-project-id');
                        progressData[projectId] = parseInt(bar.value);
                    });
                    localStorage.setItem('deffrei_progress', JSON.stringify(progressData));
                }
                
                function syncProgressToProjectsPage() {
                    const progressData = {};
                    progressBars.forEach(bar => {
                        const projectId = bar.getAttribute('data-project-id');
                        const projectName = bar.getAttribute('data-project-name');
                        progressData[projectId] = {
                            progress: parseInt(bar.value),
                            name: projectName,
                            status: parseInt(bar.value) === 100 ? 'completed' : parseInt(bar.value) > 0 ? 'in-progress' : 'not-started'
                        };
                    });
                    localStorage.setItem('deffrei_project_status', JSON.stringify(progressData));
                }
            }
            

            
            // Focus password input on load
            setTimeout(() => {
                passwordInput.focus();
            }, 100);
            
            // Show/hide password
            showPasswordCheckbox.addEventListener('change', function() {
                passwordInput.type = this.checked ? 'text' : 'password';
            });
            

            
            // Password form submission
            passwordForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const enteredPassword = passwordInput.value.trim().toUpperCase();
                
                if (enteredPassword === CORRECT_PASSWORD) {
                    passwordError.classList.add('hidden');
                    passwordInput.classList.remove('border-red-600');
                    
                    // Directly show console page after password verification
                    passwordModal.classList.add('hidden');
                    consolePage.classList.remove('hidden');
                    
                    // Initialize progress bars after console is visible
                    initProgressBars();
                } else {
                    passwordError.classList.remove('hidden');
                    passwordInput.classList.add('border-red-600');
                    passwordInput.focus();
                    
                    // Shake animation
                    passwordInput.style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        passwordInput.style.animation = '';
                    }, 500);
                }
            });
            

            
            // Close console
            closeConsoleButton.addEventListener('click', function() {
                consolePage.classList.add('hidden');
                passwordModal.classList.remove('hidden');
                passwordInput.value = '';
                passwordError.classList.add('hidden');
                passwordInput.classList.remove('border-red-600');
                
                // Reset verification form
                verificationCodeInput.value = '';
                verificationError.classList.add('hidden');
                verificationCodeInput.classList.remove('border-red-600');
                
                // Clear countdown
                if (countdownTimer) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                }
                
                // Show password form
                showPasswordForm();
            });
            

        });
    </script>
</body>
</html>
