            // Real-time synchronization for share page
            function syncToSharePage() {
                // Create data object to store all resources
                const resourcesData = {};
                
                // Get all save link buttons and collect link data
                const saveLinkButtons = document.querySelectorAll('.save-link');
                saveLinkButtons.forEach(button => {
                    const linkId = button.getAttribute('data-link-id');
                    const resourceId = button.getAttribute('data-resource-id');
                    const inputElement = document.getElementById(linkId);
                    
                    if (resourceId && inputElement) {
                        resourcesData[resourceId] = {
                            ...resourcesData[resourceId],
                            link: inputElement.value
                        };
                    }
                });
                
                // Get all save code buttons and collect code data
                const saveCodeButtons = document.querySelectorAll('.save-code');
                saveCodeButtons.forEach(button => {
                    const codeId = button.getAttribute('data-code-id');
                    const resourceId = button.getAttribute('data-resource-id');
                    const inputElement = document.getElementById(codeId);
                    
                    if (resourceId && inputElement) {
                        resourcesData[resourceId] = {
                            ...resourcesData[resourceId],
                            code: inputElement.value
                        };
                    }
                });
                
                // Store data in localStorage for share page to access
                localStorage.setItem('deffrei_resources', JSON.stringify(resourcesData));
            }
            
            // Initialize progress bars functionality
            function initProgressBars() {
                const progressBars = document.querySelectorAll('input[type="range"]');
                const progressData = JSON.parse(localStorage.getItem('deffrei_progress') || '{}');
                
                // Load saved progress data
                progressBars.forEach(bar => {
                    const projectId = bar.getAttribute('data-project-id');
                    if (progressData[projectId] !== undefined) {
                        bar.value = progressData[projectId];
                        updateProgressBar(bar);
                    }
                });
                
                // Add event listeners
                progressBars.forEach(bar => {
                    bar.addEventListener('input', function() {
                        updateProgressBar(this);
                        saveProgressData();
                    });
                    
                    bar.addEventListener('change', function() {
                        // Sync with projects page when progress changes
                        syncProgressToProjectsPage();
                    });
                });
                
                function updateProgressBar(bar) {
                    const projectId = bar.getAttribute('data-project-id');
                    const progress = parseInt(bar.value);
                    const progressText = bar.previousElementSibling;
                    const progressBar = bar.closest('.bg-darkgray-lighter').querySelector('.bg-green-500, .bg-yellow-500, .bg-gray-500');
                    const statusBadge = bar.closest('.bg-darkgray-lighter').querySelector('span');
                    
                    // Update progress text
                    progressText.textContent = `${progress}% 完成`;
                    
                    // Update progress bar width
                    if (progressBar) {
                        progressBar.style.width = `${progress}%`;
                        
                        // Update color based on progress
                        if (progress === 100) {
                            progressBar.className = 'bg-green-500 h-2 rounded-full';
                            if (statusBadge) {
                                statusBadge.className = 'text-green-500';
                                statusBadge.textContent = '已完成';
                            }
                        } else if (progress > 0) {
                            progressBar.className = 'bg-yellow-500 h-2 rounded-full';
                            if (statusBadge) {
                                statusBadge.className = 'text-yellow-500';
                                statusBadge.textContent = '开发中';
                            }
                        } else {
                            progressBar.className = 'bg-gray-500 h-2 rounded-full';
                            if (statusBadge) {
                                statusBadge.className = 'text-gray-500';
                                statusBadge.textContent = '未开始';
                            }
                        }
                    }
                }
                
                function saveProgressData() {
                    const progressData = {};
                    progressBars.forEach(bar => {
                        const projectId = bar.getAttribute('data-project-id');
                        progressData[projectId] = parseInt(bar.value);
                    });
                    localStorage.setItem('deffrei_progress', JSON.stringify(progressData));
                }
                
                function syncProgressToProjectsPage() {
                    const progressData = {};
                    progressBars.forEach(bar => {
                        const projectId = bar.getAttribute('data-project-id');
                        const projectName = bar.getAttribute('data-project-name');
                        progressData[projectId] = {
                            progress: parseInt(bar.value),
                            name: projectName,
                            status: parseInt(bar.value) === 100 ? 'completed' : parseInt(bar.value) > 0 ? 'in-progress' : 'not-started'
                        };
                    });
                    localStorage.setItem('deffrei_project_status', JSON.stringify(progressData));
                }
            }
            
            // Initialize data synchronization
            function initSynchronization() {
                // Save link buttons
                const saveLinkButtons = document.querySelectorAll('.save-link');
                saveLinkButtons.forEach(button => {
                    button.addEventListener('click', function() {
                        const linkId = this.getAttribute('data-link-id');
                        const resourceId = this.getAttribute('data-resource-id');
                        const inputElement = document.getElementById(linkId);
                        
                        if (inputElement && resourceId) {
                            // Update button text temporarily
                            const originalText = this.textContent;
                            this.textContent = '已保存';
                            this.classList.add('bg-green-600');
                            
                            // Sync data
                            syncToSharePage();
                            
                            // Reset button after delay
                            setTimeout(() => {
                                this.textContent = originalText;
                                this.classList.remove('bg-green-600');
                            }, 1500);
                        }
                    });
                });
                
                // Save code buttons
                const saveCodeButtons = document.querySelectorAll('.save-code');
                saveCodeButtons.forEach(button => {
                    button.addEventListener('click', function() {
                        const codeId = this.getAttribute('data-code-id');
                        const resourceId = this.getAttribute('data-resource-id');
                        const inputElement = document.getElementById(codeId);
                        
                        if (inputElement && resourceId) {
                            // Update button text temporarily
                            const originalText = this.textContent;
                            this.textContent = '已保存';
                            this.classList.add('bg-green-600');
                            
                            // Sync data
                            syncToSharePage();
                            
                            // Reset button after delay
                            setTimeout(() => {
                                this.textContent = originalText;
                                this.classList.remove('bg-green-600');
                            }, 1500);
                        }
                    });
                });
                

                
                // Auto-sync on input change (optional)
                const allInputs = document.querySelectorAll('input[type="text"]');
                allInputs.forEach(input => {
                    input.addEventListener('change', syncToSharePage);
                });
                
                // Publish all changes button
                const publishButton = document.getElementById('publish-changes');
                if (publishButton) {
                    publishButton.addEventListener('click', function() {
                        syncToSharePage();
                        
                        // Show success message
                        const originalText = this.innerHTML;
                        this.innerHTML = '<i class="fa fa-check mr-2"></i> 所有更改已发布';
                        this.classList.add('bg-green-600');
                        
                        setTimeout(() => {
                            this.innerHTML = originalText;
                            this.classList.remove('bg-green-600');
                        }, 2000);
                    });
                }
            }
            
            // Focus password input on load
            setTimeout(() => {
                passwordInput.focus();
            }, 100);
            
            // Show/hide password
            showPasswordCheckbox.addEventListener('change', function() {
                passwordInput.type = this.checked ? 'text' : 'password';
            });
            
            // Generate random verification code
            function generateVerificationCode() {
                return Math.floor(100000 + Math.random() * 900000).toString();
            }
            
            // Send verification code (real email sending)
            function sendVerificationCode() {
                currentVerificationCode = generateVerificationCode();
                
                // Show sending status
                const sendingMessage = document.createElement('div');
                sendingMessage.className = 'bg-blue-900 bg-opacity-30 border border-blue-600 text-blue-400 px-4 py-2 rounded-md text-sm mt-2';
                sendingMessage.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i> <span>正在发送验证码，请稍候...</span>';
                verificationForm.appendChild(sendingMessage);
                
                // Configure email parameters
                const emailParams = {
                    SecureToken: "your_secure_token_here", // Replace with your actual secure token
                    To: EMAIL,
                    From: "noreply@pandoragame.com", // Replace with your sender email
                    Subject: "Deffrei控制台二次验证 - 验证码",
                    Body: `
                        <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f4f4;">
                            <div style="background-color: #1d3557; color: white; padding: 20px; border-radius: 5px 5px 0 0;">
                                <h2 style="margin: 0;">Deffrei控制台二次验证</h2>
                            </div>
                            <div style="background-color: white; padding: 30px; border-radius: 0 0 5px 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                                <p>您好，Deffrei Targaryan</p>
                                <p>您正在尝试访问开发者控制台，这是您的二次验证验证码：</p>
                                <div style="font-size: 32px; font-weight: bold; text-align: center; margin: 30px 0; color: #e63946; letter-spacing: 5px;">
                                    ${currentVerificationCode}
                                </div>
                                <p>验证码有效期为5分钟，请尽快使用。</p>
                                <p style="color: #666; font-size: 12px; margin-top: 30px;">
                                    此邮件由系统自动发送，请勿回复。如果您没有尝试登录，请忽略此邮件。
                                </p>
                            </div>
                        </div>
                    `
                };
                
                // Send email using SMTP.js
                Email.send(emailParams)
                    .then(() => {
                        // Remove sending message
                        sendingMessage.remove();
                        
                        // Show success message
                        const successMessage = document.createElement('div');
                        successMessage.className = 'bg-green-900 bg-opacity-30 border border-green-600 text-green-400 px-4 py-2 rounded-md text-sm mt-2';
                        successMessage.innerHTML = `<i class="fa fa-check-circle mr-1"></i> <span>验证码已成功发送至您的邮箱。验证码：${currentVerificationCode}</span>`;
                        verificationForm.appendChild(successMessage);
                        
                        // Remove success message after 3 seconds
                        setTimeout(() => {
                            successMessage.remove();
                        }, 3000);
                        
                        console.log('Verification code sent successfully to', EMAIL + ':', currentVerificationCode);
                    })
                    .catch(error => {
                        // Remove sending message
                        sendingMessage.remove();
                        
                        // Show error message
                        const errorMessage = document.createElement('div');
                        errorMessage.className = 'bg-red-900 bg-opacity-30 border border-red-600 text-red-400 px-4 py-2 rounded-md text-sm mt-2';
                        errorMessage.innerHTML = '<i class="fa fa-exclamation-circle mr-1"></i> <span>发送失败，请稍后重试。错误：' + error.message + '</span>';
                        verificationForm.appendChild(errorMessage);
                        
                        console.error('Failed to send verification code:', error);
                        
                        // Enable resend button immediately
                        resendCodeButton.disabled = false;
                        countdownElement.textContent = '发送失败';
                    });
            }
            
            // Start countdown timer
            function startCountdown() {
                countdownSeconds = 300; // Reset to 5 minutes
                updateCountdown();
                
                if (countdownTimer) {
                    clearInterval(countdownTimer);
                }
                
                countdownTimer = setInterval(() => {
                    countdownSeconds--;
                    updateCountdown();
                    
                    if (countdownSeconds <= 0) {
                        clearInterval(countdownTimer);
                        resendCodeButton.disabled = false;
                        countdownElement.textContent = '已过期';
                        verificationError.classList.remove('hidden');
                        verificationError.querySelector('span').textContent = '验证码已过期，请重新发送。';
                    }
                }, 1000);
            }
            
            // Update countdown display
            function updateCountdown() {
                const minutes = Math.floor(countdownSeconds / 60);
                const seconds = countdownSeconds % 60;
                countdownElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
            
            // Show verification form
            function showVerificationForm() {
                passwordForm.classList.add('hidden');
                verificationForm.classList.remove('hidden');
                verificationError.classList.add('hidden');
                verificationCodeInput.value = '';
                verificationCodeInput.focus();
                
                // Send verification code and start countdown
                sendVerificationCode();
                startCountdown();
            }
            
            // Show password form
            function showPasswordForm() {
                verificationForm.classList.add('hidden');
                passwordForm.classList.remove('hidden');
                passwordInput.focus();
                
                // Clear countdown
                if (countdownTimer) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                }
            }
            
            // Password form submission
            passwordForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const enteredPassword = passwordInput.value.trim().toUpperCase();
                
                if (enteredPassword === CORRECT_PASSWORD) {
                    passwordError.classList.add('hidden');
                    passwordInput.classList.remove('border-red-600');
                    
                    // Show verification form for two-factor authentication
                    showVerificationForm();
                } else {
                    passwordError.classList.remove('hidden');
                    passwordInput.classList.add('border-red-600');
                    passwordInput.focus();
                    
                    // Shake animation
                    passwordInput.style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        passwordInput.style.animation = '';
                    }, 500);
                }
            });
            
            // Verification form submission
            verificationForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const enteredCode = verificationCodeInput.value.trim();
                
                if (enteredCode === currentVerificationCode && countdownSeconds > 0) {
                    verificationError.classList.add('hidden');
                    verificationCodeInput.classList.remove('border-red-600');
                    passwordModal.classList.add('hidden');
                    consolePage.classList.remove('hidden');
                    
                    // Clear countdown
                    if (countdownTimer) {
                        clearInterval(countdownTimer);
                        countdownTimer = null;
                    }
                    
                    // Initialize progress bars after console is visible
                    initProgressBars();
                } else {
                    verificationError.classList.remove('hidden');
                    verificationCodeInput.classList.add('border-red-600');
                    verificationCodeInput.focus();
                    
                    // Shake animation
                    verificationCodeInput.style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        verificationCodeInput.style.animation = '';
                    }, 500);
                }
            });
            
            // Close console
            closeConsoleButton.addEventListener('click', function() {
                consolePage.classList.add('hidden');
                passwordModal.classList.remove('hidden');
                passwordInput.value = '';
                passwordError.classList.add('hidden');
                passwordInput.classList.remove('border-red-600');
                
                // Reset verification form
                verificationCodeInput.value = '';
                verificationError.classList.add('hidden');
                verificationCodeInput.classList.remove('border-red-600');
                
                // Clear countdown
                if (countdownTimer) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                }
                
                // Show password form
                showPasswordForm();
            });
            
            // Back to password button
            backToPasswordButton.addEventListener('click', function() {
                showPasswordForm();
            });
            
            // Resend code button
            resendCodeButton.addEventListener('click', function() {
                if (!this.disabled) {
                    sendVerificationCode();
                    startCountdown();
                    this.disabled = true;
                    verificationError.classList.add('hidden');
                    verificationCodeInput.focus();
                    
                    // Show success message
                    const successMessage = document.createElement('div');
                    successMessage.className = 'bg-green-900 bg-opacity-30 border border-green-600 text-green-400 px-4 py-2 rounded-md text-sm mt-2';
                    successMessage.innerHTML = '<i class="fa fa-check-circle mr-1"></i> <span>验证码已重新发送。</span>';
                    verificationForm.appendChild(successMessage);
                    
                    setTimeout(() => {
                        successMessage.remove();
                    }, 3000);
                }
            });
            
            // Change email button (placeholder functionality)
            changeEmailButton.addEventListener('click', function() {
                alert('邮箱修改功能暂未开放。当前邮箱：' + EMAIL);
            });
            
            // Auto-focus verification code input on paste
            verificationCodeInput.addEventListener('paste', function(e) {
                setTimeout(() => {
                    if (this.value.length === 6) {
                        verificationForm.dispatchEvent(new Event('submit'));
                    }
                }, 100);
            });
            
            // Only allow numbers in verification code input
            verificationCodeInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        });
    </script>
</body>
</html>
